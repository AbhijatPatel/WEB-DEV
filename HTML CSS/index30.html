<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5f5f5;
      }

      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        width: 600px;
        height: 400px;
        background-color: #fff;
        border-radius: 10px;
        box-shadow: 10px 10px 5px rgba(0, 0, 0, 0.2);
        position: relative;
        overflow: hidden;
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .caption {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 50%;
        background-color: rgba(0, 0, 0, 0.5);
        padding: 10px;
        color: #fff;
        font-family: "Caveat", cursive;

      }

      .caption h2 {
        font-size: 2.75rem;
        margin-bottom: 10px;
      }

      .caption p {
        font-size: 1.25rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="card">
        <img
          src="	https://www.shutterstock.com/image-photo/april-3-2025-miami-rolls-260nw-2626160127.jpg"
          alt="car image"
        />
        <div class="caption">
          <h2><u>EMPIRE</u></h2>
          <p> <span>&#8658;</span> 
            A luxury car like Rolls‑Royce is a symbol of success and high status. Many successful businessmen dream of owning such cars. Their hard work, dedication, and smart decisions help them achieve this level of success. 
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
