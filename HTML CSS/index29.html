<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        height: 100vh;
        background-color: #242b2e;
      }

      .container {
        margin: 20vh auto;
        width: 21vw;
        padding: 15px;
        border-radius: 12px;
        background-image: linear-gradient(#db0b5f, #6f00ed);
        color: wheat;
        box-shadow: #e2e1e1 0px 10px 36px 0px, #e2e1e1 0px 0px 0px 1px;
      }
      .container img{
        width: 100%;
        object-fit: cover;
      }
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 700;
        color: white;
        font-weight: bold;
        margin: 5px 0px;
      }
      .text {
        margin: 5px 0px;
        font-family: "Baloo Bhai 2", cursive;
        font-weight: 400;
        line-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="image29.jpeg"
        alt=""
      />
      <h1>This is a Sample Heading</h1>
      <div class="text">
            A computer is an electronic machine used to store and process information. It helps students in studying, doing assignments, and searching information on the internet. Computers make learning easier and faster.
      </div>
    </div>
  </body>
</html>
