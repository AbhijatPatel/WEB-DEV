<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css position property</title>
    <style>
        div{
            border: 1px solid #000;
        }
        img{
            margin: 10px;
            border: 5px green solid;
        }

        .image2{
            position: relative;
            top: 100px;
             left:200px; 
             position: absolute; 
        }

        .container{
            background-color: brown;
            position: relative;
            height: 3000px;
        }

        .image4{
            position: fixed;
        }

        .image3{
            position: sticky;
            top: 100px;
        }

        .box{
            background-color: aqua;
            height:1500px ;
        }
    </style>
</head>
<div>
    <div class="container">
        <img src="./image/poster1.jpeg"
     alt="poster1"
     width="300px"
     height="300px"
     class="image1">
    

     <img src="./image/poster2.jpeg"
     alt="poster2"
     width="300px"
     height="300px"
     class="image2">

     <img src="./image/poster3.jpeg"
     alt="poster3"
     width="300px"
     height="300px"
     class="image3">

     <img src="./image/poster4.jpeg"
     alt="poster4"
     width="300px"
     height="300px"
     class="image4">
    </div>

    <div class="box">

    </div>

    

</body>
</html>
