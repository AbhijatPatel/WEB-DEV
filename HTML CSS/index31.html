<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUSIC CARD</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

.wrapper h1 {
  margin: 20px auto;
  text-align: center;
  font-size: 40px;
  color: rgb(51, 51, 51);
  color: #333333;
}
    .container {
      max-width: 1200px;
      height: 450px;
      margin:0 auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      border: 3px solid black;
      justify-content: center;
      align-items: center;
    }
    .music-card {
      width: 45%;
      display: flex;
      height: 7rem;
      background-color: black;
      gap: 20px;
      color: red;
      font-family: "Gill Sans" "Gill Sans MT" Calibri, "Trebuchet MS",
        sans-serif;
    
      border-radius: 40px;
      transition: all 0.3s;
      box-shadow: 2px 2px 10px #606060a9;
    }
    .music-card:hover {
      background: black;
      border: 5px solid red;
    }
    .music-card img {
      border-radius: 8px 0 0 8px;
      width: 110px;
    }

    .music-card h2 {
      align-self: center;
    }
  </style>
  <body>

   <div class="wrapper">
    <h1><u>THE MUSIC CARD LIST</u></h1>
     <div class="container">
      <div class="music-card">
        <img
          src="https://static-cse.canva.com/blob/978202/1600w-YmFtIRl8-qo.jpg"
          alt=""
        />
        <h2>Liked Songs</h2>
      </div>
      <div class="music-card">
        <img src="https://cdn.musicvine.com/images/good-vibes-collection-cover-v2_5528980777329875.jpg" alt="">
        <h2>Happy Vibes</h2>
      </div>
      <div class="music-card">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTi1wuDXGD8hAA2XsGUCT0UJR4FNBA1XRQqjA&s"
          alt=""
        />
        <h2>Arijit Singh Mix</h2>
      </div>
      <div class="music-card">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR3cWrVNIve5NFZPTgKXl6GMX8sYGDEiSFv2Q&s"
          alt=""
        />
        <h2>Vaaste</h2>
      </div>
      <div class="music-card">
        <img
          src="https://a10.gaanacdn.com/images/albums/93/3398093/crop_480x480_3398093.jpg"
          alt=""
        />
        <h2>The Carnival</h2>
      </div>
      <div class="music-card">
        <img
          src="https://c.saavncdn.com/735/Sanam-Best-Is-Back-Hindi-2016-500x500.jpg"
          alt=""
        />
        <h2>This Is Sanam</h2>
      </div>

    </div>
   </div>
  </body>
</html>
