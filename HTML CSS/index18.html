<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS size units</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .box{
            border: 2px solid red;
            width: 50%;
        }

        .parent{
            border: 2px solid blue;
            background-color:green;
            width: 50%;
        }

        .child{
            border: 2px sloid yellow;
            background-color: red ;
            width: 20%;
        }

        .container{
            background-color: aqua;
            border: 2px solid blue;
            height: 100vh;
            width: 50vw;
        }
    </style>
</head>
<body>
    <div class="box">
        welcome to the my website.
    </div>

    <br><br>

    <div class="parent">
        <div class="child">
            CHILD
        </div>
    </div>

    <br><br>
    <div class="container">
        welcome 
    </div>
</body>
</html>
