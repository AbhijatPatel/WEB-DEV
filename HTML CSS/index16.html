<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline,block,inline-block</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;

        }

        .box{
            display: inline;
            width: 300px;
            height: 300px;
            border: 1px solid black;
            padding: 100px;
        }

        span{
            border: 2px solid green;
            width: 800px;
            height: 400px;
            margin: 30px;
            display: block;
        }
        /* div{
            border: 2px solid red;
            width: 300px;
            height: 300px;
            margin: 25px;
            padding: 50px;

        } */
    </style>
</head>
<body>
    <div>Welcome to CodeNest.</div>

    <div class="box">Welcome to CodeNest2.0</div>

    <span> This is Abhijat Patel.

    </span>

    <span>
        This is Abhijat Patel 2.0.
    </span>

</body>
</html>
